<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DiplomaEZ</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#172411;color:#f5ffe8;font-family:system-ui,Segoe UI,sans-serif}canvas{display:block;width:100vw;height:100vh}.ui{position:fixed;z-index:5}.top{top:14px;left:14px;right:14px;display:flex;justify-content:space-between;gap:12px;pointer-events:none}.card{background:rgba(8,12,10,.86);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px 16px;box-shadow:0 14px 32px rgba(0,0,0,.25)}h1,h2,h3{margin:0 0 8px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.64);display:none;align-items:center;justify-content:center;z-index:20}.box{width:min(92vw,820px);max-height:88vh;overflow:auto;background:#121a14;border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:22px}.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;margin:8px 8px 0 0}.primary{background:linear-gradient(#cfff89,#82ea58);color:#12200b}.ghost{background:rgba(255,255,255,.08);color:#f5ffe8;border:1px solid rgba(255,255,255,.1)}.danger{background:rgba(255,90,90,.18);color:#ffd6d6;border:1px solid rgba(255,90,90,.25)}textarea,input{width:100%;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;padding:13px;box-sizing:border-box}textarea{min-height:140px}.prompt{bottom:90px;left:50%;transform:translateX(-50%);display:none}.hot{bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px}.slot{width:82px;height:62px;display:grid;place-items:center;background:rgba(255,255,255,.08);border:2px solid #e5c46e;border-radius:14px;font-size:13px}.load{position:fixed;inset:0;background:radial-gradient(circle,#395f20,#050805);z-index:99;display:grid;place-items:center}.bar{height:16px;border-radius:99px;background:rgba(255,255,255,.12);overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#cfff89,#6ff1b0);transition:.3s}.small{color:#c8d8c2}.ans{white-space:pre-wrap;background:rgba(255,255,255,.06);border-radius:16px;padding:14px;margin:8px 0}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);margin:4px;font-size:12px}</style></head><body><div id="load" class="load"><div class="card" style="width:min(90vw,520px);text-align:center"><h1>DiplomaEZ</h1><p>Loading online arena...</p><div class="bar"><div id="fill" class="fill"></div></div><p id="ls" class="small">Preparing portals...</p></div></div><canvas id="c"></canvas><div class="ui top"><div class="card"><b>DiplomaEZ</b><div class="small">WASD move • E enter • T stats • H help</div></div><div class="card"><b id="stats">Score 0 • Solved 0/18 • Streak 0</b></div></div><div id="prompt" class="ui card prompt">Press E to enter portal</div><div class="ui hot"><div class="slot">Study</div><div class="slot">Review</div><div class="slot">Stats</div><div class="slot">Help</div></div><div id="modal" class="modal"><div id="box" class="box"></div></div><script>const TOPICS=[['Data Structures','Explain the difference between arrays and linked lists.','Arrays store data in contiguous memory, which makes indexed access fast. Linked lists store nodes in scattered memory and connect them using pointers, which makes insertion and deletion flexible.'],['GoF Patterns','Explain the intent of the Singleton pattern.','Singleton ensures that one class has only one instance and provides a global access point, but it can become an anti-pattern because global state hurts testing and creates hidden dependencies.'],['Compilers','What is the difference between syntax analysis and semantic analysis?','Syntax analysis checks grammar and structure. Semantic analysis checks meaning, such as type compatibility and whether symbols are declared.'],['Machine Learning','What is the difference between supervised and unsupervised learning?','Supervised learning uses labeled training data. Unsupervised learning uses unlabeled data and discovers hidden patterns or clusters.'],['GPUs & CUDA','What is the difference between CPU and GPU architecture?','A CPU has fewer powerful cores optimized for serial logic. A GPU has many simpler cores optimized for parallel throughput.'],['Algorithms','What is the main disadvantage of brute force?','Brute force is simple but usually has poor time complexity, often exponential or factorial, making it unusable for large inputs.'],['Security','Explain SQL Injection and how to prevent it.','SQL injection inserts malicious SQL through input fields. The best prevention is parameterized queries or prepared statements.'],['RAM & Turing','What is the purpose of the RAM model?','The RAM model gives a platform-independent way to analyze algorithms by assuming basic operations take constant time.'],['RISC','Why is pipelining more effective in RISC than CISC?','RISC instructions are simple and uniform, so pipeline stages can run predictably. CISC instructions vary more, causing stalls.'],['Data Models','What is a foreign key?','A foreign key is an attribute that references a primary key in another table and enforces referential integrity.'],['Automata','What is an alphabet in formal languages?','An alphabet is a finite, non-empty set of symbols from which strings are formed.'],['Paradigms','What is the difference between imperative and declarative programming?','Imperative programming describes how to do something step by step. Declarative programming describes what result is wanted.'],['Data Types','What is the difference between static and dynamic memory allocation?','Static allocation is fixed at compile time. Dynamic allocation happens at runtime and allows variable memory sizes, usually on the heap.'],['Techniques','What are the two mandatory parts of recursion?','A recursive function needs a base case to stop and a recursive step that moves toward the base case.'],['App Dev','How does the JVM provide platform independence?','Java compiles source code to bytecode, and the JVM on each platform translates that bytecode for the local machine.'],['Architectures','What is the Von Neumann bottleneck?','It is the performance limitation caused by sharing one bus for instructions and data, making the CPU wait for memory access.'],['Numbers','Why is UTF-8 the modern standard over ASCII?','ASCII only represents 128 characters. UTF-8 supports Unicode and can encode global languages and emojis while staying compatible with ASCII.'],['Final State','How could monitoring of integration services be enhanced?','Monitoring can be enhanced with centralized logs, tracing, alerts, dashboards, correlation IDs, and health checks.']];let cvs=document.getElementById('c'),ctx=cvs.getContext('2d'),w=0,h=0,scale=1;let p={x:1300,y:780,v:270,t:0},cam={x:1300,y:780},world={w:2600,h:1600},keys={},near=null,prog=JSON.parse(localStorage.diplomaez_online||'{"score":0,"streak":0,"best":0,"done":{},"wrong":{},"ans":{}}');let img=new Image();img.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTI4IiBoZWlnaHQ9IjEyOCIgdmlld0JveD0iMCAwIDEyOCAxMjgiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iNjQiIGN5PSI2NCIgcj0iNjQiIGZpbGw9IiNlYmQyYjYiLz48Y2lyY2xlIGN4PSI0NyIgY3k9IjU2IiByPSI3IiBmaWxsPSIjMzMyIi8+PGNpcmNsZSBjeD0iODEiIGN5PSI1NiIgcj0iNyIgZmlsbD0iIzMzMiIvPjxwYXRoIGQ9Ik00NSA4MGMxMiAxMCAyNiAxMCAzOCAwIiBzdHJva2U9IiM3YTMzMzMiIHN0cm9rZS13aWR0aD0iNyIgZmlsbD0ibm9uZSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+PHBhdGggZD0iTTE4IDQ2QzI4IDEyIDk3IDggMTEwIDQ5Yy0zMS0xMy02MS0xMy05Mi0zeiIgZmlsbD0iI2U5YzY2ZCIvPjx0ZXh0IHg9IjY0IiB5PSIxMTgiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtc2l6ZT0iMTIiIGZpbGw9IiM0NDMiPkZhY2U8L3RleHQ+PC9zdmc+';const portals=TOPICS.map((q,i)=>({i,title:q[0],x:300+(i%5)*500,y:260+Math.floor(i/5)*350,col:['#8eff87','#ffa7eb','#82efff','#ffe27f','#c59cff','#ffb089'][i%6]}));function save(){localStorage.diplomaez_online=JSON.stringify(prog)}function resize(){scale=Math.min(devicePixelRatio||1,1.5);cvs.width=innerWidth*scale;cvs.height=innerHeight*scale;cvs.style.width=innerWidth+'px';cvs.style.height=innerHeight+'px'}addEventListener('resize',resize);resize();addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=1;if(e.key==='Escape')close();if(e.key.toLowerCase()==='e'&&near)portal(near);if(e.key.toLowerCase()==='t')stats();if(e.key.toLowerCase()==='h')help()});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);function update(dt){let dx=0,dy=0;if(keys.w||keys.arrowup)dy--;if(keys.s||keys.arrowdown)dy++;if(keys.a||keys.arrowleft)dx--;if(keys.d||keys.arrowright)dx++;let l=Math.hypot(dx,dy)||1;if(dx||dy){p.x=Math.max(120,Math.min(world.w-120,p.x+dx/l*p.v*dt));p.y=Math.max(120,Math.min(world.h-120,p.y+dy/l*p.v*dt));p.t+=dt*9}cam.x+=(p.x-cam.x)*.08;cam.y+=(p.y-cam.y)*.08;near=null;let bd=9999;for(const po of portals){let d=Math.hypot(po.x-p.x,po.y-p.y);if(d<bd){bd=d;near=po}}document.getElementById('prompt').style.display=bd<125?'block':'none'}function draw(t){ctx.clearRect(0,0,cvs.width,cvs.height);let g=ctx.createLinearGradient(0,0,0,cvs.height);g.addColorStop(0,'#8dcc19');g.addColorStop(1,'#243414');ctx.fillStyle=g;ctx.fillRect(0,0,cvs.width,cvs.height);ctx.save();ctx.scale(scale,scale);ctx.translate(-(cam.x-innerWidth/2),-(cam.y-innerHeight/2));round(80,80,world.w-160,world.h-160,56,'#6e893f');ctx.strokeStyle='rgba(0,0,0,.18)';for(let x=100;x<world.w-100;x+=48){ctx.beginPath();ctx.moveTo(x,100);ctx.lineTo(x,world.h-100);ctx.stroke()}for(let y=100;y<world.h-100;y+=48){ctx.beginPath();ctx.moveTo(100,y);ctx.lineTo(world.w-100,y);ctx.stroke()}for(let i=0;i<160;i++){let x=(i*97)%2400+110,y=(i*173)%1400+110;ctx.strokeStyle=i%3?'#83f076':'#e37c88';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x,y+15);ctx.quadraticCurveTo(x+Math.sin(t+i)*5,y,x,y-18);ctx.stroke()}for(const po of portals)drawPortal(po,t);drawPlayer(t);ctx.restore();hud()}function round(x,y,w,h,r,f){ctx.fillStyle=f;ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.fill()}function drawPortal(po,t){let done=prog.done[po.i],c=done?'#ffe680':po.col;ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(po.x,po.y+18,70,24,0,0,7);ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=5;for(let i=0;i<3;i++){ctx.beginPath();ctx.ellipse(po.x,po.y,45+i*8+Math.sin(t*2+i)*3,13+i*4,0,0,7);ctx.stroke()}ctx.fillStyle=c;ctx.globalAlpha=.18;ctx.beginPath();ctx.arc(po.x,po.y,75+Math.sin(t*2)*5,0,7);ctx.fill();ctx.globalAlpha=1;ctx.font='700 15px system-ui';let tw=ctx.measureText(po.title).width;round(po.x-tw/2-14,po.y-75,tw+28,27,13,'rgba(8,12,10,.82)');ctx.fillStyle='#f8ffd8';ctx.textAlign='center';ctx.fillText(po.title,po.x,po.y-56);if(done)ctx.fillText('✓',po.x,po.y+5)}function drawPlayer(t){ctx.save();ctx.translate(p.x,p.y+Math.sin(p.t||t)*2);ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(0,32,34,14,0,0,7);ctx.fill();ctx.fillStyle='#ff8f71';ctx.beginPath();ctx.moveTo(0,-5);ctx.lineTo(30,34);ctx.lineTo(-30,34);ctx.closePath();ctx.fill();ctx.fillStyle='#5f3aa0';ctx.beginPath();ctx.moveTo(-10,-54);ctx.lineTo(3,-88);ctx.lineTo(18,-50);ctx.fill();ctx.save();ctx.beginPath();ctx.arc(0,-24,27,0,7);ctx.clip();ctx.drawImage(img,-30,-54,60,60);ctx.restore();ctx.strokeStyle='#eadcc5';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-24,27,0,7);ctx.stroke();ctx.restore()}function hud(){let solved=Object.keys(prog.done).length;document.getElementById('stats').textContent=`Score ${prog.score} • Solved ${solved}/${TOPICS.length} • Streak ${prog.streak}`}function modal(html){box.innerHTML=html;document.getElementById('modal').style.display='flex'}function close(){document.getElementById('modal').style.display='none'}function portal(po){let q=TOPICS[po.i];modal(`<h2>${q[0]}</h2><p class="small">Topic portal. Correct answers disappear; wrong answers return to practice.</p><span class="badge">${prog.done[po.i]?'cleared':'available'}</span><span class="badge">${prog.wrong[po.i]?'wrong queue':'not missed'}</span><div class="ans"><b>Question:</b><br>${q[1]}</div><textarea id="a" placeholder="Type your answer...">${prog.ans[po.i]||''}</textarea><button class="btn primary" onclick="review(${po.i})">Submit Answer</button><button class="btn ghost" onclick="close()">Back</button>`)}function review(i){prog.ans[i]=document.getElementById('a').value;save();let q=TOPICS[i];modal(`<h2>Review Answer</h2><div class="ans"><b>Question:</b><br>${q[1]}</div><div class="ans"><b>Your answer:</b><br>${prog.ans[i]||'(empty)'}</div><div class="ans"><b>Correct answer:</b><br>${q[2]}</div><button class="btn primary" onclick="mark(${i},1)">Yes, it was correct</button><button class="btn danger" onclick="mark(${i},0)">No, it wasn't</button>`)}function mark(i,ok){if(ok){prog.done[i]=1;delete prog.wrong[i];prog.score+=10;prog.streak++;prog.best=Math.max(prog.best||0,prog.streak)}else{prog.wrong[i]=1;prog.streak=0}save();portal(portals[i])}function stats(){modal(`<h2>Progress</h2><p>Score: ${prog.score}</p><p>Solved: ${Object.keys(prog.done).length}/${TOPICS.length}</p><p>Wrong queue: ${Object.keys(prog.wrong).length}</p><p>Best streak: ${prog.best||0}</p><button class="btn danger" onclick="localStorage.removeItem('diplomaez_online');location.reload()">Reset progress</button><button class="btn ghost" onclick="close()">Close</button>`)}function help(){modal('<h2>How to Play</h2><p>Move with WASD. Stand near a portal and press E. Answer the question, submit it, then honestly mark if it was correct. Correct questions stay solved; wrong questions stay available for review.</p><button class="btn primary" onclick="close()">Got it</button>')}let last=0;function loop(ts){let dt=Math.min(.033,(ts-last)/1000||.016);last=ts;update(dt);draw(ts/1000);requestAnimationFrame(loop)}let f=document.getElementById('fill'),ls=document.getElementById('ls');let n=0,iv=setInterval(()=>{n+=20;f.style.width=n+'%';if(n>=100){clearInterval(iv);document.getElementById('load').style.display='none';requestAnimationFrame(loop)}},120)</script></body></html>
