<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DiplomaEZ</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#16250f;color:#f4ffe8;font-family:system-ui}canvas{display:block;width:100vw;height:100vh}.box{background:#101810e6;border:1px solid #ffffff22;border-radius:18px;padding:16px;box-shadow:0 12px 35px #0008}.screen{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle,#365f20,#050805);z-index:50}.login-card{width:min(92vw,430px);max-height:92vh;overflow:auto}input,textarea{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #ffffff33;background:#ffffff12;color:white;padding:12px;margin:6px 0 10px}textarea{min-height:120px}.btn{border:0;border-radius:12px;padding:11px 14px;margin:6px 6px 0 0;font-weight:800;cursor:pointer}.ok{background:#bfff78;color:#102008}.ghost{background:#ffffff18;color:white;border:1px solid #ffffff22}.bad{background:#ff777733;color:#ffdada;border:1px solid #ff777755}#hud{position:fixed;top:12px;left:12px;right:12px;display:none;justify-content:space-between;pointer-events:none;z-index:3}#prompt{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);display:none;z-index:3}#modal{position:fixed;inset:0;background:#0009;display:none;place-items:center;z-index:40}#panel{width:min(92vw,760px);max-height:86vh;overflow:auto}.answer{white-space:pre-wrap;background:#ffffff10;border-radius:12px;padding:12px;margin:10px 0}.small{color:#cde0c8}</style></head><body><canvas id="c"></canvas><div id="login" class="screen"><div class="box login-card"><h1>DiplomaEZ</h1><p class="small">Login to continue.</p><label>ID</label><input id="uid" autocomplete="username" autofocus><label>Password</label><input id="pw" type="password" autocomplete="current-password"><button class="btn ok" onclick="loginNow()">Enter Arena</button><p class="small">ID: <b>Gabby</b> &nbsp; PASS: <b>1234</b></p><p id="msg" style="color:#ffbbbb"></p></div></div><div id="hud" class="box"><b>DiplomaEZ</b><span>WASD move • E enter • T stats • H help</span><span id="stat"></span></div><div id="prompt" class="box">Press E</div><div id="modal"><div id="panel" class="box"></div></div><script>const ID='Gabby',PW='1234',KEY='diplomaez_progress_v8';const DATA=[['Data Structures',[['Stack vs queue?','Stack is LIFO. Queue is FIFO.'],['Array vs linked list?','Array has fast indexed access. Linked list has flexible insert/delete.'],['Hash table use?','Fast key value lookup using a hash function.']]],['GoF Patterns',[['Singleton intent?','Only one instance plus a global access point.'],['Factory Method?','Lets subclasses decide which object type to create.'],['Observer?','Updates dependent objects when a subject changes.']]],['Compilers',[['Lexical analysis?','Turns characters into tokens.'],['Syntax vs semantic analysis?','Syntax checks grammar. Semantic checks meaning.'],['Code generation?','Creates target code from an intermediate form.']]],['Machine Learning',[['Supervised learning?','Learning from labeled examples.'],['Clustering?','Grouping similar data without labels.'],['Overfitting?','Model memorizes training data and generalizes poorly.']]],['GPUs and CUDA',[['Why GPUs?','They run many similar operations in parallel.'],['What is CUDA?','NVIDIA platform for general GPU programming.'],['CUDA kernel?','Function executed by many GPU threads.']]],['Algorithms',[['Brute force?','Trying all possible solutions.'],['Divide and conquer?','Split, solve smaller parts, combine results.'],['Dynamic programming?','Store results of overlapping subproblems.']]],['Security',[['Why validate input?','To prevent invalid or unsafe data from entering the system.'],['Why hash passwords?','So original passwords are not stored directly.'],['What is least privilege?','Give users and code only the access they need.']]],['RAM and Turing',[['RAM model purpose?','Platform independent algorithm analysis.'],['Turing machine?','Theoretical computation model with tape and states.'],['Why models matter?','They help reason about computability and efficiency.']]],['RISC',[['RISC meaning?','Reduced Instruction Set Computer.'],['Why good for pipelining?','Instructions are simple and uniform.'],['Pipeline?','Overlapping instruction stages for throughput.']]],['Data Models',[['Relational model?','Data stored in tables with rows and columns.'],['Primary key?','Unique identifier of a row.'],['Foreign key?','Reference to a primary key in another table.']]],['Automata',[['Alphabet?','Finite set of symbols.'],['Finite automaton?','State machine recognizing regular languages.'],['Grammar?','Rules for generating strings.']]],['Paradigms',[['Imperative programming?','Describes step by step how to compute.'],['Declarative programming?','Describes what result is wanted.'],['OOP?','Programs organized around objects with state and behavior.']]],['Data Types',[['Static typing?','Types checked before runtime.'],['Dynamic typing?','Types checked during runtime.'],['Heap allocation?','Memory reserved dynamically while program runs.']]],['Techniques',[['Recursion parts?','Base case and recursive step.'],['Parameter?','Input variable of a function.'],['Control flow?','Order of executed statements.']]],['Application Development',[['JVM platform independence?','Java bytecode runs on JVMs for different systems.'],['Bytecode?','Intermediate code for a virtual machine.'],['Exception?','Special mechanism for abnormal situations.']]],['Architectures',[['Von Neumann architecture?','Instructions and data share memory.'],['Bottleneck?','CPU waits for shared memory access.'],['Cache?','Small fast memory near the CPU.']]],['Numbers',[['Why binary?','Hardware naturally uses two states.'],['Two complement?','Common representation of signed integers.'],['UTF-8 importance?','Unicode support with ASCII compatibility.']]],['Final State',[['Better monitoring?','Use logs, traces, alerts, dashboards and health checks.'],['Async integration benefit?','Systems are decoupled and more resilient.'],['Message queue?','Stores messages between producer and consumer.']]]];let prog=JSON.parse(localStorage[KEY]||'{"score":0,"streak":0,"best":0,"done":{},"wrong":{},"ans":{}}'),cv=c,ctx=cv.getContext('2d'),D=1,keys={},p={x:1250,y:760,v:260,t:0},cam={x:1250,y:760},near=null,open=false,started=false,world={w:2600,h:1600},colors=['#8eff87','#ffa7eb','#82efff','#ffe27f','#c59cff','#ffb089'];const portals=DATA.map((g,i)=>({i,x:260+(i%5)*510,y:250+Math.floor(i/5)*350,c:colors[i%colors.length]}));function loginNow(){if(uid.value.trim().toLowerCase()==ID.toLowerCase()&&pw.value.trim()==PW){login.style.display='none';hud.style.display='flex';save();if(!started){started=true;loop(0)}}else msg.textContent='Wrong ID or password.'}uid.onkeydown=e=>{if(e.key==='Enter')pw.focus()};pw.onkeydown=e=>{if(e.key==='Enter')loginNow()};function save(){localStorage[KEY]=JSON.stringify(prog);stat.textContent=`Score ${prog.score} • Solved ${Object.keys(prog.done).length}/${DATA.length*3} • Streak ${prog.streak}`}function resize(){D=Math.min(devicePixelRatio||1,1.5);cv.width=innerWidth*D;cv.height=innerHeight*D;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px'}addEventListener('resize',resize);resize();addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=1;if(e.key==='Escape')closeM();if(login.style.display!=='none'||open)return;if(e.key.toLowerCase()==='e'&&near)portal(near.i);if(e.key.toLowerCase()==='t')stats();if(e.key.toLowerCase()==='h')help()});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);modal.onclick=e=>{if(e.target==modal)closeM()};function upd(dt){if(login.style.display!=='none'||open)return;let dx=0,dy=0;if(keys.w||keys.arrowup)dy--;if(keys.s||keys.arrowdown)dy++;if(keys.a||keys.arrowleft)dx--;if(keys.d||keys.arrowright)dx++;let l=Math.hypot(dx,dy)||1;if(dx||dy){p.x=Math.max(100,Math.min(world.w-100,p.x+dx/l*p.v*dt));p.y=Math.max(100,Math.min(world.h-100,p.y+dy/l*p.v*dt));p.t+=dt*9}cam.x+=(p.x-cam.x)*.08;cam.y+=(p.y-cam.y)*.08;let bd=9999;near=null;for(const po of portals){let d=Math.hypot(po.x-p.x,po.y-p.y);if(d<bd){bd=d;near=po}}prompt.style.display=bd<120?'block':'none';if(near)prompt.textContent='Press E to enter '+DATA[near.i][0]}let last=0;function loop(ts){let dt=Math.min(.033,(ts-last)/1000||.016);last=ts;upd(dt);draw(ts/1000);requestAnimationFrame(loop)}function draw(t){ctx.clearRect(0,0,cv.width,cv.height);let g=ctx.createLinearGradient(0,0,0,cv.height);g.addColorStop(0,'#8ac914');g.addColorStop(1,'#203816');ctx.fillStyle=g;ctx.fillRect(0,0,cv.width,cv.height);ctx.save();ctx.scale(D,D);ctx.translate(-(cam.x-innerWidth/2),-(cam.y-innerHeight/2));ctx.fillStyle='#6f8b42';round(70,70,world.w-140,world.h-140,50);ctx.strokeStyle='#0003';for(let x=100;x<world.w-100;x+=50){ctx.beginPath();ctx.moveTo(x,100);ctx.lineTo(x,world.h-100);ctx.stroke()}for(let y=100;y<world.h-100;y+=50){ctx.beginPath();ctx.moveTo(100,y);ctx.lineTo(world.w-100,y);ctx.stroke()}for(let i=0;i<150;i++){let xx=(i*97)%2400+100,yy=(i*173)%1400+100;ctx.strokeStyle=i%3?'#7cec74':'#e47e88';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(xx,yy+15);ctx.quadraticCurveTo(xx+Math.sin(t+i)*5,yy,xx,yy-18);ctx.stroke()}portals.forEach(po=>{let done=DATA[po.i][1].every((_,qi)=>prog.done[po.i+'_'+qi]),col=done?'#ffe680':po.c;ctx.strokeStyle=col;ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(po.x,po.y,55,18,0,0,7);ctx.stroke();ctx.fillStyle=col;ctx.globalAlpha=.2;ctx.beginPath();ctx.arc(po.x,po.y,80+Math.sin(t*2)*4,0,7);ctx.fill();ctx.globalAlpha=1;ctx.font='700 15px system-ui';let name=DATA[po.i][0],tw=ctx.measureText(name).width;ctx.fillStyle='#111c';rr(po.x-tw/2-12,po.y-72,tw+24,26,13);ctx.fillStyle='#f8ffd8';ctx.textAlign='center';ctx.fillText(name,po.x,po.y-54);if(done)ctx.fillText('✓',po.x,po.y+5)});player(t);ctx.restore();save()}function player(t){ctx.save();ctx.translate(p.x,p.y+Math.sin(p.t||t)*2);ctx.fillStyle='#0005';ctx.beginPath();ctx.ellipse(0,35,34,13,0,0,7);ctx.fill();ctx.fillStyle='#ff8f71';ctx.beginPath();ctx.moveTo(0,-5);ctx.lineTo(30,35);ctx.lineTo(-30,35);ctx.closePath();ctx.fill();ctx.fillStyle='#5f3aa0';ctx.beginPath();ctx.moveTo(-10,-55);ctx.lineTo(3,-88);ctx.lineTo(18,-52);ctx.fill();ctx.fillStyle='#eadcc5';ctx.beginPath();ctx.arc(0,-28,33,0,7);ctx.fill();ctx.fillStyle='#2d241e';ctx.font='700 24px system-ui';ctx.textAlign='center';ctx.fillText('G',0,-20);ctx.restore()}function round(a,b,c,d,r){ctx.beginPath();ctx.moveTo(a+r,b);ctx.arcTo(a+c,b,a+c,b+d,r);ctx.arcTo(a+c,b+d,a,b+d,r);ctx.arcTo(a,b+d,a,b,r);ctx.arcTo(a,b,a+c,b,r);ctx.fill()}function rr(a,b,c,d,r){round(a,b,c,d,r)}function qid(i,qi){return i+'_'+qi}function choose(i,wrong){let arr=DATA[i][1].map((q,qi)=>({q,qi,id:qid(i,qi)})).filter(o=>!prog.done[o.id]);if(wrong)arr=arr.filter(o=>prog.wrong[o.id]);return arr.length?arr[Math.floor(Math.random()*arr.length)]:null}function portal(i){let d=DATA[i][1].filter((_,qi)=>prog.done[qid(i,qi)]).length,w=DATA[i][1].filter((_,qi)=>prog.wrong[qid(i,qi)]&&!prog.done[qid(i,qi)]).length;show(`<h2>${DATA[i][0]}</h2><p class="small">Correct questions disappear. Wrong questions return to the pool.</p><p>${d}/${DATA[i][1].length} solved • ${w} wrong</p><button class="btn ok" onclick="question(${i},0)">Start Random Question</button><button class="btn ghost" onclick="question(${i},1)">Practice Wrong Questions</button><button class="btn ghost" onclick="closeM()">Close</button>`)}function question(i,wrong){let o=choose(i,wrong);if(!o){show(`<h2>${DATA[i][0]}</h2><p>No ${wrong?'wrong':'available'} questions here right now.</p><button class="btn ok" onclick="portal(${i})">Back</button>`);return}show(`<h2>${DATA[i][0]}</h2><div class="answer"><b>Question:</b>\n${o.q[0]}</div><textarea id="a">${prog.ans[o.id]||''}</textarea><button class="btn ok" onclick="review(${i},${o.qi},${wrong?1:0})">Submit Answer</button><button class="btn ghost" onclick="portal(${i})">Back</button>`)}function review(i,qi,wrong){let id=qid(i,qi),q=DATA[i][1][qi];prog.ans[id]=a.value;save();show(`<h2>Review</h2><div class="answer"><b>Question:</b>\n${q[0]}</div><div class="answer"><b>Your answer:</b>\n${prog.ans[id]||'(empty)'}</div><div class="answer"><b>Correct answer:</b>\n${q[1]}</div><button class="btn ok" onclick="mark(${i},${qi},${wrong},1)">Yes, it was correct</button><button class="btn bad" onclick="mark(${i},${qi},${wrong},0)">No, it wasn't</button>`)}function mark(i,qi,wrong,ok){let id=qid(i,qi);if(ok){prog.done[id]=1;delete prog.wrong[id];prog.score+=wrong?8:10;prog.streak++;prog.best=Math.max(prog.best||0,prog.streak)}else{prog.wrong[id]=1;prog.streak=0}save();show(`<h2>${ok?'Saved as correct':'Returned to pool'}</h2><button class="btn ok" onclick="question(${i},${wrong})">Next Question</button><button class="btn ghost" onclick="portal(${i})">Back to Portal</button>`)}function stats(){show(`<h2>Progress</h2><p>Score: ${prog.score}</p><p>Solved: ${Object.keys(prog.done).length}/${DATA.length*3}</p><p>Best streak: ${prog.best||0}</p><button class="btn bad" onclick="reset()">Reset Progress</button><button class="btn ghost" onclick="logout()">Logout</button>`)}function help(){show('<h2>How to Play</h2><p>Login with Gabby / 1234. Move with WASD, stand near a portal and press E. Correct questions disappear. Wrong questions stay in the random pool.</p><button class="btn ok" onclick="closeM()">Got it</button>')}function reset(){localStorage.removeItem(KEY);prog=JSON.parse(localStorage[KEY]||'{"score":0,"streak":0,"best":0,"done":{},"wrong":{},"ans":{}}');closeM();save()}function logout(){location.reload()}function show(h){open=true;panel.innerHTML=h;modal.style.display='grid'}function closeM(){open=false;modal.style.display='none'}function clamp(n,a,b){return Math.max(a,Math.min(b,n))}</script></body></html>
