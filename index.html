<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DiplomaEZ</title>
  <link rel="stylesheet" href="style.css?v=20260620-mobile-version">
  <link rel="stylesheet" href="character.css?v=20260620-mobile-version">
  <link rel="stylesheet" href="mobile-controls.css?v=20260620-mobile-version">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <section id="loginScreen" class="screen">
    <div class="card login-card">
      <div class="badge">DiplomaEZ</div>
      <h1>Login</h1>
      <p class="muted">Enter the arena and continue your saved progress.</p>

      <label for="loginId">ID</label>
      <input id="loginId" autocomplete="username" placeholder="Gabby">

      <label for="loginPass">Password</label>
      <input id="loginPass" type="password" autocomplete="current-password" placeholder="1234">

      <button id="loginButton" class="btn primary">Enter Arena</button>
      <p class="hint">ID: <b>Gabby</b> &nbsp; PASS: <b>1234</b></p>
      <p id="loginError" class="error"></p>
    </div>
  </section>

  <header id="hud" class="hud hidden">
    <div class="panel hud-left">
      <strong>DiplomaEZ</strong>
      <span>WASD / arrows move • E enter portal • T stats • H help</span>
    </div>
    <div class="panel hud-right">
      <strong id="scoreText">Score 0</strong>
      <span id="progressText">Solved 0/0</span>
      <span id="streakText">Streak 0</span>
    </div>
  </header>

  <aside id="sidePanel" class="side-panel hidden">
    <h3>Topic Portals</h3>
    <div id="topicList"></div>
  </aside>

  <div id="portalPrompt" class="portal-prompt hidden">Press E</div>

  <section id="modal" class="modal hidden" aria-modal="true">
    <div id="modalContent" class="modal-content"></div>
  </section>

  <div id="toast" class="toast hidden"></div>

  <script src="data/b00.js?v=20260620-mobile-version"></script>
  <script src="data/b01.js?v=20260620-mobile-version"></script>
  <script src="data/b02.js?v=20260620-mobile-version"></script>
  <script src="data/b03.js?v=20260620-mobile-version"></script>
  <script src="data/b04.js?v=20260620-mobile-version"></script>
  <script src="data/b05.js?v=20260620-mobile-version"></script>
  <script src="data/b06.js?v=20260620-mobile-version"></script>
  <script src="data/b07.js?v=20260620-mobile-version"></script>
  <script src="data/b08.js?v=20260620-mobile-version"></script>
  <script src="questions-loader.js?v=20260620-mobile-version"></script>
  <script src="mobile-controls.js?v=20260620-mobile-version"></script>
</body>
</html>
